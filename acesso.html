<!DOCTYPE html>

        .module-title { font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 48px; font-weight: 800; color: var(--white); margin-bottom: 40px; letter-spacing: -2px; line-height: 1.1; background: linear-gradient(to right, #fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-size: 28px; color: var(--primary); margin: 50px 0 25px; font-weight: 700; }
        h3 { font-size: 22px; color: #cbd5e1; margin-bottom: 20px; font-weight: 600; }
        p { margin-bottom: 30px; font-size: 18px; color: var(--text); font-weight: 400; }
        .prompt-box { background: #020617; padding: 35px; border-radius: 20px; border: 1px dashed var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #7dd3fc; margin: 40px 0; position: relative; line-height: 1.6; }

        .divider { height: 1px; background: #1e293b; margin: 60px 0; }
        .method-box { background: #111827; padding: 40px; border-radius: 24px; border-left: 6px solid var(--primary); margin: 40px 0; }
        .footer { margin-top: 100px; padding-top: 40px; border-top: 1px solid #1e293b; text-align: center; color: #475569; font-size: 14px; }
